# Nixpacks / Railpack 配置
# Railway 后端使用 Railpack 构建，此文件同时兼容 Nixpacks 和 Railpack
# Root Directory 设置为 xengineer-backend/，但 Railpack 会分析整个仓库
# 因此需要在根目录放置 requirements.txt 和 runtime.txt 以便 Railpack 识别 Python 项目

[phases.setup]
nixPkgs = ["...", "python312"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "cd xengineer-backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
